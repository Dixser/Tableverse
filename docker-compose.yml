# Runs the server on the host's own persistent disk (server_data volume) —
# no cloud volume/mount config needed here, unlike the earlier Fly.io
# attempt, because this VM's disk already IS the persistent storage.
#
# Caddy sits in front for automatic HTTPS (via nip.io, so no owned domain
# is required -- see Caddyfile) and terminates TLS before proxying to the
# server container, since browsers block fetch()/WebSocket calls from the
# https:// Cloudflare Pages client to a plain http:// origin.
services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: '8000'
      DB_STORAGE: /data/tableverse.sqlite3
      CLIENT_ORIGINS: ${CLIENT_ORIGINS}
    volumes:
      - server_data:/data
    expose:
      - '8000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  server_data:
  caddy_data:
  caddy_config:
